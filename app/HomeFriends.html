<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<title>Rizz · Home — Matchmaker (Friends)</title>
<link rel="stylesheet" href="../colors_and_type.css">
<script>if (location.hash === '#embed') document.documentElement.setAttribute('data-embed','1');</script>
<style>
  html[data-embed="1"] body { background: transparent !important; margin: 0 !important; padding: 0 !important; }
  html[data-embed="1"] .page { padding: 0 !important; min-height: 0 !important; gap: 0 !important; }
  html[data-embed="1"] .page > *:not(.phone) { display: none !important; }

  html, body { margin: 0; padding: 0; background: #0E0E10; font-family: var(--font-sans); letter-spacing: -0.01em; -webkit-font-smoothing: antialiased; }
  * { box-sizing: border-box; }
  button { font-family: inherit; }
  ::-webkit-scrollbar { width: 0; height: 0; }

  .page { min-height: 100vh; padding: 56px 48px 120px; display: flex; flex-direction: column; align-items: center; gap: 32px; }
  .page-head { max-width: 520px; text-align: center; color: #EDEEF1; }
  .eyebrow { font-family: 'IBM Plex Mono', ui-monospace, monospace; font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--color-primary-500); margin-bottom: 12px; }
  .page-h1 { font-weight: 800; font-size: 32px; letter-spacing: -0.6px; line-height: 1.15; margin: 0 0 10px; color: #fff; }
  .page-sub { font-size: 14px; color: rgba(237,238,241,0.6); letter-spacing: -0.25px; line-height: 1.55; }

  /* Phone frame */
  .phone { width: 393px; height: 852px; border-radius: 47px; border: 10px solid #1A1A1A; box-shadow: 0 30px 60px rgba(0,0,0,0.25), 0 0 0 1px rgba(0,0,0,0.1); overflow: hidden; background: #fff; flex-shrink: 0; position: relative; display: flex; flex-direction: column; }
  .island { position: absolute; top: 11px; left: 50%; transform: translateX(-50%); width: 120px; height: 34px; border-radius: 20px; background: #000; z-index: 50; }

  .status-bar { height: 44px; display: flex; align-items: center; justify-content: space-between; padding: 0 24px 0 32px; font-family: -apple-system, system-ui; color: var(--color-gray-950); flex-shrink: 0; position: relative; z-index: 3; }
  .status-bar .time { font-size: 15.72px; font-weight: 600; letter-spacing: -0.4px; }
  .status-bar .icons { display: flex; gap: 6px; align-items: center; }

  /* Top app header */
  .header { height: 46px; display: flex; align-items: center; justify-content: space-between; padding: 0 18px; background: #fff; flex-shrink: 0; border-bottom: 1px solid var(--color-gray-100); }
  .header-title { font-family: var(--font-sans); font-weight: 800; font-size: 17px; color: var(--color-gray-950); letter-spacing: -0.4px; }
  .coin-pill { position: relative; border: 1px solid var(--color-gray-200); border-radius: 9.5px; padding: 2px 8px 2px 16px; height: 19px; font-family: var(--font-sans); font-size: 11px; font-weight: 400; color: var(--color-gray-950); display: inline-flex; align-items: center; letter-spacing: -0.3144px; background: #fff; }
  .coin-pill img { position: absolute; left: -5px; top: -5px; width: 30px; height: 30px; }

  /* Chat header — friend pinned at top (like KakaoTalk chatroom header) */
  .chat-header {
    display: flex; align-items: center; gap: 10px;
    padding: 12px 16px;
    background: #fff; border-bottom: 1px solid var(--color-gray-100);
    flex-shrink: 0;
  }
  .ch-avatar {
    width: 42px; height: 42px; border-radius: 50%; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    color: #fff; font-weight: 700; font-size: 17px; font-family: var(--font-sans);
    box-shadow: 0 2px 6px rgba(0,0,0,0.08);
  }
  .ch-info { display: flex; flex-direction: column; gap: 2px; flex: 1; min-width: 0; }
  .ch-name { font-family: var(--font-sans); font-weight: 700; font-size: 15px; color: var(--color-gray-950); letter-spacing: -0.25px; }
  .ch-sub { font-family: var(--font-sans); font-size: 11px; color: var(--color-gray-500); letter-spacing: -0.3144px; display: flex; align-items: center; gap: 4px; }
  .ch-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--color-accent-success); }

  /* Scroll body */
  .body { flex: 1; overflow-y: auto; background: var(--color-gray-50); }

  /* Chat stream (column of bubbles, typing, video cards, replies) */
  .chat {
    padding: 14px 14px 20px;
    display: flex; flex-direction: column; gap: 4px;
  }

  /* Received bubble */
  .bubble-recv {
    align-self: flex-start;
    max-width: 260px;
    padding: 9px 14px;
    background: #fff;
    color: var(--color-gray-950);
    border-radius: 4px 18px 18px 18px;
    font-family: var(--font-latin); font-size: 15px; line-height: 20px;
    letter-spacing: -0.003em;
    word-break: break-word;
    border: 1px solid var(--color-gray-100);
    margin-bottom: 2px;
  }
  /* tighten spacing within a burst */
  .bubble-recv + .bubble-recv { margin-top: 0; }

  /* Typing bubble (received style, animated dots) */
  .typing-bubble {
    align-self: flex-start;
    padding: 12px 14px; background: #fff; border-radius: 4px 18px 18px 18px;
    display: inline-flex; gap: 4px; align-items: center;
    border: 1px solid var(--color-gray-100);
    margin-top: 4px; margin-bottom: 4px;
  }
  .typing-bubble span {
    width: 6px; height: 6px; border-radius: 50%; background: var(--color-gray-500);
  }
  .typing-bubble span:nth-child(1) { animation: rzTyping 1.2s ease-in-out 0s infinite; }
  .typing-bubble span:nth-child(2) { animation: rzTyping 1.2s ease-in-out 0.18s infinite; }
  .typing-bubble span:nth-child(3) { animation: rzTyping 1.2s ease-in-out 0.36s infinite; }
  @keyframes rzTyping {
    0%, 60%, 100% { opacity: 0.3; transform: translateY(0); }
    30% { opacity: 1; transform: translateY(-3px); }
  }

  /* Video card attachment (chat attachment style) */
  .video-card {
    align-self: flex-start;
    width: 220px; border-radius: 18px; overflow: hidden; position: relative;
    aspect-ratio: 220 / 320;
    box-shadow: 0 4px 14px rgba(26,26,26,0.12);
    background: #1A1A1E;
    margin-top: 8px; margin-bottom: 6px;
  }
  .video-card video { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; transition: filter .4s ease, transform .4s ease; }
  .video-card.locked { cursor: pointer; }
  .video-card.locked video { filter: blur(12px) brightness(0.75) saturate(1.1); transform: scale(1.08); }
  .video-card.locked:active { transform: scale(0.99); transition: transform .1s; }
  .lock-overlay { position: absolute; inset: 0; z-index: 2; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; color: #fff; background: linear-gradient(180deg, rgba(0,0,0,0.35) 0%, rgba(0,0,0,0.55) 100%); }
  .lock-circle { width: 48px; height: 48px; border-radius: 50%; background: rgba(255,255,255,0.12); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.22); display: flex; align-items: center; justify-content: center; }
  .lock-label { font-family: var(--font-sans); font-weight: 700; font-size: 13px; letter-spacing: -0.25px; }
  .coin-chip { display: flex; align-items: center; gap: 6px; padding: 6px 12px; border-radius: 1000px; background: rgba(0,0,0,0.5); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.15); font-family: var(--font-sans); font-weight: 700; font-size: 12px; color: #fff; letter-spacing: -0.25px; }
  .coin-chip img { width: 16px; height: 16px; }
  .free-chip { padding: 4px 10px; border-radius: 1000px; background: var(--gradient-brand); font-family: var(--font-sans); font-weight: 800; font-size: 10px; color: #fff; letter-spacing: 0.3px; }

  .person-info { position: absolute; left: 0; right: 0; bottom: 0; z-index: 3; padding: 28px 14px 12px; background: linear-gradient(180deg, transparent, rgba(0,0,0,0.82)); color: #fff; }
  .person-name-row { display: flex; align-items: baseline; gap: 6px; }
  .person-name { font-family: var(--font-sans); font-weight: 800; font-size: 18px; letter-spacing: -0.4px; }
  .person-age { font-family: var(--font-sans); font-size: 13px; opacity: 0.85; }
  .person-tag { font-family: var(--font-sans); font-size: 11px; opacity: 0.78; letter-spacing: -0.25px; margin-top: 2px; }

  /* Choices row (aligned with received bubbles, left) */
  .choices { align-self: stretch; display: flex; gap: 8px; margin: 6px 0 10px; }
  .btn-accept { flex: 1; padding: 12px 14px; background: var(--gradient-brand); border: none; border-radius: 12px; cursor: pointer; font-family: var(--font-sans); font-weight: 700; font-size: 14px; color: #fff; letter-spacing: -0.25px; box-shadow: 0 4px 14px rgba(255,94,25,0.32); transition: transform .1s; }
  .btn-accept:active { transform: scale(0.98); }
  .btn-reject { flex: 1; padding: 12px 14px; background: #fff; border: 1px solid var(--color-gray-200); border-radius: 12px; cursor: pointer; font-family: var(--font-sans); font-weight: 600; font-size: 14px; color: var(--color-gray-700); letter-spacing: -0.25px; transition: transform .1s; }
  .btn-reject:active { transform: scale(0.98); }

  /* Sent bubble */
  .bubble-sent {
    align-self: flex-end;
    max-width: 240px; padding: 9px 14px;
    background: var(--color-accent-sent); color: var(--color-gray-950);
    border-radius: 18px 18px 4px 18px;
    font-family: var(--font-latin); font-size: 15px; line-height: 20px;
    letter-spacing: -0.003em;
    margin-top: 4px; margin-bottom: 8px;
  }

  .end-note {
    align-self: center; text-align: center;
    padding: 16px 14px 8px;
    font-family: var(--font-sans); font-size: 12px; color: var(--color-gray-500); letter-spacing: -0.25px;
  }

  /* Match badge — personalization signal before video card */
  .match-badge {
    align-self: flex-start;
    display: inline-flex; align-items: center; gap: 6px;
    padding: 6px 12px; border-radius: 1000px;
    background: linear-gradient(90deg, rgba(255,94,25,0.15), rgba(255,94,25,0.05));
    border: 1px solid rgba(255,94,25,0.3);
    font-family: var(--font-sans); font-weight: 600; font-size: 12px;
    color: var(--color-primary-700); letter-spacing: -0.25px;
    margin: 6px 0 4px 0;
  }
  .match-badge::before {
    content: ''; width: 6px; height: 6px; border-radius: 50%;
    background: var(--color-primary-500);
    animation: pulse-match 1.5s infinite;
  }
  .match-badge b {
    color: var(--color-primary-500);
    font-size: 14px; font-weight: 800;
    margin-left: 2px;
  }
  @keyframes pulse-match {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(1.5); }
  }

  /* Teaser chips — partial reveal on top of blurred video */
  .teaser-chips {
    position: absolute; top: 10px; left: 10px; right: 10px; z-index: 3;
    display: flex; flex-wrap: wrap; gap: 4px;
    pointer-events: none;
    transition: opacity .3s;
  }
  .video-card:not(.locked) .teaser-chips { opacity: 0; }
  .teaser-chip {
    padding: 3px 9px; border-radius: 1000px;
    background: rgba(0,0,0,0.62); backdrop-filter: blur(14px);
    font-family: var(--font-sans); font-weight: 600; font-size: 10px;
    color: rgba(255,255,255,0.96); letter-spacing: -0.25px;
    border: 1px solid rgba(255,255,255,0.14);
    white-space: nowrap;
    box-shadow: 0 2px 8px rgba(0,0,0,0.2);
  }

  /* First-line peek — partial voice preview below card */
  .first-line-peek {
    align-self: flex-start;
    width: 220px;
    background: var(--color-gray-50);
    border: 1px solid var(--color-gray-100);
    border-radius: 12px;
    padding: 10px 12px;
    margin-top: -2px; margin-bottom: 8px;
    display: flex; flex-direction: column; gap: 4px;
  }
  .peek-label {
    font-family: var(--font-sans); font-weight: 700; font-size: 10px;
    color: var(--color-primary-500); letter-spacing: 0.3px;
    text-transform: uppercase;
    display: inline-flex; align-items: center; gap: 4px;
  }
  .peek-text {
    font-family: var(--font-latin); font-size: 13px; font-weight: 600;
    color: var(--color-gray-950); letter-spacing: -0.003em;
    line-height: 18px;
    position: relative;
  }
  .peek-text::after {
    content: '...';
    color: var(--color-gray-500); font-weight: 400;
  }
  .peek-rest {
    font-family: var(--font-sans); font-size: 11px; color: var(--color-gray-500);
    letter-spacing: -0.25px;
  }

  /* Story start button — shown after accept flow completes */
  .btn-story-start {
    align-self: stretch;
    display: flex; align-items: center; justify-content: space-between; gap: 12px;
    padding: 14px 18px;
    background: var(--gradient-brand);
    border: 0; border-radius: 12px;
    cursor: pointer;
    margin: 8px 0;
    box-shadow: 0 6px 18px rgba(255,94,25,0.32);
    color: #fff;
    font-family: var(--font-sans);
    transition: transform .1s ease;
  }
  .btn-story-start:active { transform: scale(0.98); }
  .btn-story-start.loading { opacity: 0.75; cursor: default; }
  .story-btn-text { display: flex; flex-direction: column; align-items: flex-start; gap: 2px; }
  .story-btn-label { font-weight: 700; font-size: 15px; letter-spacing: -0.25px; }
  .story-btn-sub { font-weight: 400; font-size: 12px; letter-spacing: -0.25px; opacity: 0.9; }
  .story-btn-arrow { font-size: 20px; font-weight: 600; opacity: 0.9; }

  /* System note (centered pill) */
  .system-note {
    align-self: center;
    padding: 7px 14px;
    background: var(--color-gray-100);
    border-radius: 1000px;
    font-family: var(--font-sans); font-size: 11px; font-weight: 500;
    color: var(--color-gray-700); letter-spacing: -0.25px;
    margin: 10px 0 6px;
  }

  /* Bottom nav */
  .bottom-nav {
    height: 83px; background: #fff; border-top: 1px solid var(--color-gray-100);
    display: flex; justify-content: space-between; padding: 12px 0 20px;
    flex-shrink: 0; position: relative; z-index: 10;
  }
  .nav-item { flex: 1; border: 0; background: transparent; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 4px; padding: 0; }
  .nav-item svg { stroke: var(--color-gray-500); }
  .nav-item .nav-label { font-family: var(--font-sans); font-size: 11px; letter-spacing: -0.25px; font-weight: 400; color: var(--color-gray-500); }
  .nav-item.active svg { stroke: var(--color-primary-500); }
  .nav-item.active .nav-label { color: var(--color-primary-500); font-weight: 700; }
  .home-indicator { position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%); width: 139px; height: 5px; border-radius: 100px; background: rgba(0,0,0,0.3); }
</style>
</head>
<body>

<div class="page">
  <div class="page-head">
    <div class="eyebrow">Home · V9 — Matchmaker</div>
    <h1 class="page-h1">친구가 한 명씩 소개해줘요</h1>
    <p class="page-sub">친구 한 명이 카톡처럼 여러 명을 순차 소개. 메시지가 하나씩 도착하고 영상 첨부 후 "괜찮은데? / 난 별로"로 답장.</p>
  </div>

  <div class="phone">
    <div class="island"></div>

    <div class="status-bar">
      <div class="time">9:41</div>
      <div class="icons">
        <svg width="18" height="10" viewBox="0 0 18 10"><rect x="0" y="6" width="3" height="4" rx="0.5" fill="#1A1A1A"/><rect x="5" y="4" width="3" height="6" rx="0.5" fill="#1A1A1A"/><rect x="10" y="2" width="3" height="8" rx="0.5" fill="#1A1A1A"/><rect x="15" y="0" width="3" height="10" rx="0.5" fill="#1A1A1A"/></svg>
        <svg width="17" height="11" viewBox="0 0 17 11"><path d="M8.5 2.2C10.8 2.2 12.9 3.1 14.4 4.6L15.5 3.5C13.7 1.7 11.2 0.5 8.5 0.5S3.3 1.7 1.5 3.5L2.6 4.6C4.1 3.1 6.2 2.2 8.5 2.2z" fill="#1A1A1A"/><circle cx="8.5" cy="9.5" r="1.5" fill="#1A1A1A"/></svg>
        <svg width="25" height="12" viewBox="0 0 25 12"><rect x="0.5" y="0.5" width="21" height="11" rx="3" stroke="#1A1A1A" fill="none"/><rect x="2" y="2" width="18" height="8" rx="1.5" fill="#1A1A1A"/><rect x="22.5" y="4" width="1.5" height="4" rx="0.5" fill="#1A1A1A" opacity="0.5"/></svg>

    </div>

    <div class="header">
      <div class="header-title">친구들의 소개</div>
      <div class="coin-pill"><img src="../assets/images/coin.png" alt=""/><span id="coinAmount">430</span></div>
    </div>

    <!-- Pinned chat header: single matchmaker friend -->
    <div class="chat-header">
      <div class="ch-avatar" id="chAvatar">현</div>
      <div class="ch-info">
        <div class="ch-name" id="chName">현수</div>
        <div class="ch-sub"><span class="ch-dot"></span>지금 온라인 · 매칭메이커</div>
      </div>
    </div>

    <!-- Scrollable chat body -->
    <div class="body" id="body">
      <div class="chat" id="chat"></div>
    </div>

    <!-- Bottom nav -->
    <div class="bottom-nav">
      <button class="nav-item active">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><path d="M9 22V12h6v10"/></svg>

      <button class="nav-item">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v10M9 10h4a2 2 0 010 4h-4a2 2 0 000 4h5"/></svg>
        <div class="nav-label">코인</div>
      </button>
      <button class="nav-item">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
        <div class="nav-label">데이트</div>
      </button>
      <button class="nav-item">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.4 8.4 0 01-.9 3.8 8.5 8.5 0 01-7.6 4.7 8.4 8.4 0 01-3.8-.9L3 21l1.9-5.7a8.4 8.4 0 01-.9-3.8 8.5 8.5 0 014.7-7.6 8.4 8.4 0 013.8-.9h.5a8.5 8.5 0 018 8z"/></svg>

      </button>
      <button class="nav-item">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        <div class="nav-label">마이페이지</div>
      </button>
      <div class="home-indicator"></div>
    </div>
  </div>
</div>

<script>
  const VIDEOS = [
    '../assets/videos/01.mp4',
    '../assets/videos/02.mp4',
    '../assets/videos/03.mp4',
    '../assets/videos/04.mp4',
    '../assets/videos/05.mp4',
  ];

  // ── One matchmaker friend introduces everyone ──
  const FRIEND = { name: '현수', hue: 28 };

  const INTROS = [
    {
      messages: [
        '야 방금 진짜 괜찮은 애 봤음 ㅋㅋ',
        '몸매 좋은데 성격도 차분함',
        '경제 과외 알바하는 애인데 똑똑해',
      ],
      moreInfo: [
        '얘는 대학원 다니는데 똑똑함 ㄹㅇ',
        '성격 조용해서 너랑 잘 맞을 듯',
        '사진도 많이 안 올리는 스타일이야',
      ],
      person: { name: '아영', age: 24, tag: '경제 과외 · 서울' },
      v: 0,
    },
    {
      messages: [
        '이번엔 특별한 애 있음',
        '일본인인데 순수하고',
        '한국남자 진짜 좋아해 ㅋㅋ',
      ],
      moreInfo: [
        '한국 온 지 2년 됐대',
        '한국어도 웬만큼 함 ㅋㅋ',
        '진짜 순수해서 너 좋아할 듯',
      ],
      person: { name: '미유', age: 23, tag: '일본 · 순수한' },
      v: 1,
    },
    {
      messages: [
        '이 누나는 니 스타일임',
        '영화광이고 분위기 있음',
        '밤에 얘기 오래함 ㅋㅋ',
      ],
      moreInfo: [
        '영화 리뷰 블로그도 있어',
        '예전에 카페에서 일했던 누나',
        '밤에 전화 잘 받는 스타일임',
      ],
      person: { name: '하린', age: 26, tag: '영화 좋아함' },
      v: 2,
    },
    {
      messages: [
        '얘는 조용한 스타일',
        '말수 적은데 감성 있음',
        '사진도 진짜 잘 찍어',
      ],
      moreInfo: [
        '말은 적은데 들어주는 타입임',
        '사진 감성 진짜 좋음 ㄹㅇ',
        '너가 먼저 말 걸어야 할 듯 ㅋㅋ',
      ],
      person: { name: '수빈', age: 22, tag: '차분한 · 감성' },
      v: 3,
    },
    {
      messages: [
        '마지막 한 명 더 소개함 ㅋㅋ',
        '이쁘기도 한데 분위기가 묘해',
        '너랑 진짜 잘 맞을 듯',
      ],
      moreInfo: [
        '옷 입는 센스도 좋고',
        '예술 관련 일 해서 감각 있어',
        '이번엔 진짜 니가 마음에 들어할 듯',
      ],
      person: { name: '다인', age: 25, tag: '감성적 · 분위기' },
      v: 4,
    },
  ];

  // ── Init friend avatar/name ──
  const chAvatar = document.getElementById('chAvatar');
  const chName   = document.getElementById('chName');
  chAvatar.style.background = `linear-gradient(135deg, hsl(${FRIEND.hue}, 55%, 70%), hsl(${FRIEND.hue}, 45%, 50%))`;
  chAvatar.textContent = FRIEND.name[0];
  chName.textContent   = FRIEND.name;

  // ── DOM refs ──
  const chat    = document.getElementById('chat');
  const bodyEl  = document.getElementById('body');
  const coinEl  = document.getElementById('coinAmount');

  // ── State ──
  let coins = 430;
  let visibleCount = 0;
  let currentTyping = null;

  // ── Helpers ──
  const delay = ms => new Promise(r => setTimeout(r, ms));

  function scrollToBottom() {
    bodyEl.scrollTo({ top: bodyEl.scrollHeight, behavior: 'smooth' });
  }

  function bubbleEl(text) {
    const b = document.createElement('div');
    b.className = 'bubble-recv';
    b.textContent = text;
    return b;
  }

  function sentEl(text) {
    const b = document.createElement('div');
    b.className = 'bubble-sent';
    b.textContent = text;
    return b;
  }

  function typingEl() {
    const t = document.createElement('div');
    t.className = 'typing-bubble';
    t.innerHTML = '<span></span><span></span><span></span>';
    return t;
  }

  function svgLock() {
    return '<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>';
  }

  function showTyping() {
    if (currentTyping) return;
    const t = typingEl();
    chat.appendChild(t);
    currentTyping = t;
    scrollToBottom();
  }

  function hideTyping() {
    if (currentTyping) { currentTyping.remove(); currentTyping = null; }
  }

  function appendBubble(text) {
    chat.appendChild(bubbleEl(text));
    scrollToBottom();
  }

  function appendVideoCard(intro, i, { unlocked, free }) {
    const card = document.createElement('div');
    card.className = 'video-card' + (unlocked ? '' : ' locked');
    card.dataset.introIdx = i;
    card.dataset.unlocked = unlocked ? '1' : '0';
    card.dataset.free = free ? '1' : '0';
    card.innerHTML = `
      <video src="${VIDEOS[intro.v]}" muted loop playsinline preload="metadata" ${unlocked ? 'autoplay' : ''}></video>
      ${!unlocked ? `
        <div class="lock-overlay">
          <div class="lock-circle">${svgLock()}</div>
          <div class="lock-label">잠김</div>
          ${free ? `<div class="free-chip">무료 1회</div>`
                 : `<div class="coin-chip"><img src="../assets/images/coin.png" alt=""/><span>10</span></div>`}
        </div>
      ` : ''}
      <div class="person-info">
        <div class="person-name-row">
          <div class="person-name">${intro.person.name}</div>
          <div class="person-age">${intro.person.age}</div>
        </div>
        <div class="person-tag">${intro.person.tag}</div>
      </div>`;

    // click the locked card to unlock (pay 10 coins, or free for first intro)
    if (!unlocked) {
      card.addEventListener('click', () => {
        if (card.dataset.unlocked === '1') return;
        const isFree = card.dataset.free === '1';
        if (!isFree) {
          if (coins < 10) { card.animate([{transform:'translateX(0)'},{transform:'translateX(-4px)'},{transform:'translateX(4px)'},{transform:'translateX(0)'}], {duration:240}); return; }
          coins -= 10;
          coinEl.textContent = coins;
        }
        unlockCard(card);
      });
    }

    chat.appendChild(card);
    scrollToBottom();
    return card;
  }

  function appendChoices(i, card) {
    const c = document.createElement('div');
    c.className = 'choices';
    c.innerHTML = `
      <button class="btn-accept">괜찮은데?</button>
      <button class="btn-reject">난 별로</button>
    `;
    c.querySelector('.btn-accept').addEventListener('click', () => handleAccept(i, c, card));
    c.querySelector('.btn-reject').addEventListener('click', () => handleReject(c));
    chat.appendChild(c);
    scrollToBottom();
    return c;
  }

  function unlockCard(card) {
    card.classList.remove('locked');
    const overlay = card.querySelector('.lock-overlay');
    if (overlay) overlay.remove();
    const vid = card.querySelector('video');
    if (vid) { vid.play().catch(()=>{}); }
  }

  // ── Intro animation: messages one at a time, then video + choices ──
  async function animateIntro(i) {
    const intro = INTROS[i];
    const msgs  = intro.messages;
    const free  = (i === 0);

    for (let k = 0; k < msgs.length; k++) {
      showTyping();
      await delay(k === 0 ? 1000 : 700);
      hideTyping();
      appendBubble(msgs[k]);
      await delay(500);
    }

    // brief typing before video attachment
    showTyping();
    await delay(1100);
    hideTyping();

    const card = appendVideoCard(intro, i, { unlocked: free, free });
    appendChoices(i, card);
  }

  // ── Handlers ──
  function handleAccept(i, choicesNode, card) {
    const free = (i === 0);
    // Charge coin only if video still locked (user didn't click-to-unlock first)
    if (card.dataset.unlocked !== '1') {
      if (!free) {
        if (coins < 10) return;
        coins -= 10;
        coinEl.textContent = coins;
      }
      unlockCard(card);
    }
    choicesNode.replaceWith(sentEl('괜찮은데? 얘기해봐'));
    scrollToBottom();
    setTimeout(() => afterAccept(i), 900);
  }

  function handleReject(choicesNode) {
    choicesNode.replaceWith(sentEl('음... 난 별로'));
    scrollToBottom();
    setTimeout(afterReject, 900);
  }

  // ── After-accept flow: friend gives more details + connects ──
  async function afterAccept(i) {
    const intro = INTROS[i];
    const more  = intro.moreInfo || [];

    for (let k = 0; k < more.length; k++) {
      showTyping();
      await delay(k === 0 ? 1000 : 700);
      hideTyping();
      appendBubble(more[k]);
      await delay(500);
    }

    showTyping();
    await delay(900);
    hideTyping();
    appendBubble('그럼 내가 연결해줌 ㅋㅋ');
    await delay(400);

    appendStoryStart(i, intro);
  }

  // ── After-reject: friend ack + next intro ──
  async function afterReject() {
    showTyping();
    await delay(700);
    hideTyping();
    appendBubble('ㅋㅋ 알겠어 그럼 다음');
    await delay(500);
    advance();
  }

  // ── Story start button (CTA that simulates going to chat) ──
  function appendStoryStart(i, intro) {
    const btn = document.createElement('button');
    btn.className = 'btn-story-start';
    btn.innerHTML = `
      <div class="story-btn-text">
        <span class="story-btn-label">${intro.person.name}한테 바로 가기</span>
        <span class="story-btn-sub">첫 대화 시작하기</span>
      </div>
      <span class="story-btn-arrow">→</span>
    `;
    btn.addEventListener('click', () => {
      if (btn.classList.contains('loading')) return;
      btn.classList.add('loading');
      btn.innerHTML = `<div class="story-btn-text"><span class="story-btn-label">연결 중...</span></div>`;
      setTimeout(() => {
        btn.remove();
        const note = document.createElement('div');
        note.className = 'system-note';
        note.textContent = `${intro.person.name}과의 대화가 시작됐어요`;
        chat.appendChild(note);
        scrollToBottom();
        setTimeout(advance, 1100);
      }, 1200);
    });
    chat.appendChild(btn);
    scrollToBottom();
  }

  // ── Advance to next intro ──
  async function advance() {
    if (visibleCount >= INTROS.length) {
      const end = document.createElement('div');
      end.className = 'end-note';
      end.textContent = '오늘의 소개는 여기까지 · 내일 또 봐요';
      chat.appendChild(end);
      scrollToBottom();
      return;
    }
    visibleCount++;
    await animateIntro(visibleCount - 1);
  }

  advance();
</script>
</body>
</html>
