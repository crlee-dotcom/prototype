<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<title>Rizz · Home — Stories + Grid</title>
<link rel="stylesheet" href="../colors_and_type.css">
<script>if (location.hash === '#embed') document.documentElement.setAttribute('data-embed','1');</script>
<style>
  html[data-embed="1"] body { background: transparent !important; margin: 0 !important; padding: 0 !important; }
  html[data-embed="1"] .page { padding: 0 !important; min-height: 0 !important; gap: 0 !important; }
  html[data-embed="1"] .page > *:not(.phone) { display: none !important; }

  html, body { margin: 0; padding: 0; background: #0E0E10; font-family: var(--font-sans); }
  * { box-sizing: border-box; }
  button { font-family: inherit; }
  ::-webkit-scrollbar { width: 0; height: 0; }

  .page { min-height: 100vh; padding: 56px 48px 120px; display: flex; flex-direction: column; align-items: center; gap: 32px; }
  .page-head { max-width: 520px; text-align: center; color: #EDEEF1; }
  .eyebrow { font-family: 'IBM Plex Mono', ui-monospace, monospace; font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--color-primary-500); margin-bottom: 12px; }
  .page-h1 { font-weight: 800; font-size: 32px; letter-spacing: -0.6px; line-height: 1.15; margin: 0 0 10px; color: #fff; }
  .page-sub { font-size: 14px; color: rgba(237,238,241,0.6); letter-spacing: -0.25px; line-height: 1.55; }

  /* ─ Phone 393×852 ─────────────────────────── */
  .phone {
    width: 393px; height: 852px; border-radius: 47px;
    border: 10px solid #1A1A1A;
    box-shadow: 0 30px 60px rgba(0,0,0,0.25), 0 0 0 1px rgba(0,0,0,0.1);
    overflow: hidden; background: #fff; flex-shrink: 0;
    position: relative; display: flex; flex-direction: column;
  }
  .island {
    position: absolute; top: 11px; left: 50%; transform: translateX(-50%);
    width: 120px; height: 34px; border-radius: 20px; background: #000; z-index: 50;
  }

  /* ─ Status bar ────────────────────────────── */
  .status-bar {
    height: 46.112px; background: #fff; flex-shrink: 0;
    position: relative; z-index: 3;
  }
  .status-bar .time {
    position: absolute; left: 32px; top: 50%; transform: translateY(-50%);
    font-family: -apple-system, system-ui; font-size: 15.72px; font-weight: 600;
    letter-spacing: -0.3144px; color: #171717;
  }
  .status-bar .icons {
    position: absolute; right: 15px; top: 50%; transform: translateY(-50%);
    display: flex; align-items: center; gap: 6px;
  }

  /* ─ Header 38px: settings · Rizz wordmark · coin ─ */
  .header {
    height: 38px; display: flex; align-items: center; justify-content: space-between;
    padding: 0 20px; background: #fff; flex-shrink: 0;
  }
  .header-left {
    display: flex; align-items: center;
    /* Figma: gap 116 between settings and wordmark inside a 195-wide container */
    gap: 116px;
  }
  .wordmark { height: 20px; width: auto; display: block; }

  /* Coin pill — exact Rizz spec (height 19, pr 8, pl 16, border 1px gray-100, radius 9.5) */
  .coin-pill {
    position: relative; height: 19px;
    border: 1px solid var(--color-gray-200);
    border-radius: 9.5px; padding: 2px 8px 2px 16px;
    background: #fff;
    font-family: var(--font-sans); font-size: 11px; font-weight: 400;
    color: var(--color-gray-950); letter-spacing: -0.3144px;
    display: inline-flex; align-items: center;
  }
  .coin-pill .coin-img {
    position: absolute; left: -5px; top: -5px; width: 30px; height: 30px;
  }

  /* ─ Body scroll ──────────────────────────── */
  .body { flex: 1; overflow-y: auto; background: #fff; }

  /* ─ Activity strip (Profile M State) ──────── */
  .activity {
    display: flex; gap: 13px; padding: 14px 14px 0;
    overflow-x: auto;
  }
  .profile {
    width: 91px; height: 112.968px; flex-shrink: 0;
    display: flex; flex-direction: column; align-items: center;
    position: relative;
  }
  .avatar {
    width: 91.2px; height: 91.2px; border-radius: 50%;
    overflow: hidden; position: relative;
    border: 2px solid #fff;
    box-shadow: 0 0 0 1px var(--color-gray-100);
  }
  .avatar video {
    width: 100%; height: 100%; object-fit: cover; display: block;
    background: var(--color-gray-100);
  }
  /* badge overlaps bottom of avatar (Figma inset 69.19% top) */
  .badge-row {
    position: absolute; left: 50%; top: 78.17px; transform: translateX(-50%);
    display: flex; flex-direction: column; align-items: center; gap: 2.4px;
  }
  .badge {
    padding: 2.4px 4.8px; border-radius: 4.8px;
    font-family: var(--font-sans); font-weight: 700; font-size: 10px; line-height: 1.3;
    color: #fff; letter-spacing: -0.025px; white-space: nowrap;
  }
  .badge.progress { background: linear-gradient(117.69deg, rgba(255,52,25,0.7) 1.08%, rgba(255,94,25,0.7) 78.78%); }
  .badge.completed { background: rgba(140,140,140,0.7); }
  .profile-name {
    font-family: var(--font-sans); font-weight: 400; font-size: 14px; line-height: 20px;
    color: #000; letter-spacing: -0.25px; text-align: center;
    max-width: 91px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }

  /* ─ Daily card (progress) ────────────────── */
  .daily {
    margin: 24px 14px;
    background: var(--color-gray-50);
    border: 1px solid var(--color-gray-100);
    border-radius: 12px;
    padding: 14px 16px;
    display: flex; flex-direction: column; gap: 10px;
  }
  .daily-top {
    display: flex; justify-content: space-between; align-items: baseline;
  }
  .daily-title {
    font-family: var(--font-sans); font-weight: 700; font-size: 14px; line-height: 20px;
    color: var(--color-gray-950); letter-spacing: -0.25px;
  }
  .daily-count {
    font-family: var(--font-sans); font-weight: 700; font-size: 14px; line-height: 20px;
    color: var(--color-gray-700); letter-spacing: -0.25px;
  }
  .daily-count b {
    font-size: 18px; color: var(--color-primary-500);
    letter-spacing: -0.3px;
  }
  .daily-bar {
    height: 6px; background: var(--color-gray-200); border-radius: 4px; overflow: hidden;
  }
  .daily-fill {
    height: 100%; background: var(--gradient-brand); border-radius: 4px;
    transition: width .3s ease;
  }
  .daily-caption {
    font-family: var(--font-sans); font-weight: 400; font-size: 12px; line-height: 16px;
    color: var(--color-gray-700); letter-spacing: -0.25px;
  }
  .daily-caption b {
    font-weight: 700; color: var(--color-gray-950);
    font-variant-numeric: tabular-nums;
  }

  /* ─ Grid — 2 cols, 298px tall tiles, 12px gap ─ */
  .grid {
    padding: 0 14px;
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
  }
  .tile {
    width: 100%; height: 298px; border-radius: 12.28px;
    overflow: hidden; position: relative;
    background: var(--color-gray-200);
    cursor: pointer;
  }
  .tile video {
    position: absolute; inset: 0; width: 100%; height: 100%;
    object-fit: cover; display: block;
  }
  .tile::after {
    /* gradient exactly per Figma — transparent 64.26% → 56% black 82.69% → 80% black 104.36% */
    content: ''; position: absolute; inset: 0; z-index: 1;
    background: linear-gradient(180deg, rgba(0,0,0,0) 64.26%, rgba(0,0,0,0.56) 82.69%, rgba(0,0,0,0.8) 104.36%);
    pointer-events: none;
  }
  .tile-content {
    position: absolute; left: 12px; bottom: 14.11px; width: 152px; z-index: 2;
    display: flex; flex-direction: column; gap: 6px;
    color: #fff;
  }
  .tile-text {
    display: flex; flex-direction: column; gap: 4px; color: #fff;
  }
  .tile-name-row {
    display: flex; gap: 6px; align-items: center; line-height: 20px;
    letter-spacing: -0.25px; white-space: nowrap;
  }
  .tile-name {
    font-family: var(--font-sans); font-weight: 700; font-size: 16px;
  }
  .tile-age {
    font-family: var(--font-sans); font-weight: 400; font-size: 14px;
  }
  .tile-desc {
    font-family: var(--font-sans); font-weight: 400; font-size: 11px;
    line-height: normal; letter-spacing: -0.3144px;
  }
  .tags { display: flex; gap: 4px; align-items: center; }
  .tag {
    background: rgba(0,0,0,0.6); border-radius: 100px;
    padding: 2px 4px;
    display: inline-flex; align-items: center; gap: 1px;
    font-family: var(--font-sans); font-weight: 500; font-size: 10px; line-height: 1.4;
    color: #fff; letter-spacing: -0.2px; white-space: nowrap;
  }

  /* ─ Load more CTA button ──────────────────── */
  .load-more-wrap { padding: 20px 14px 20px; }
  .load-more {
    width: 100%; border: 0; cursor: pointer;
    border-radius: 12px; padding: 14px 18px;
    background: var(--gradient-brand); color: #fff;
    display: flex; align-items: center; justify-content: space-between; gap: 12px;
    box-shadow: 0 4px 14px rgba(255,94,25,0.28);
    transition: transform .1s ease;
    font-family: var(--font-sans);
  }
  .load-more:active { transform: scale(0.98); }
  .load-more .lm-text {
    display: flex; flex-direction: column; align-items: flex-start; gap: 2px;
  }
  .load-more .lm-main {
    font-weight: 700; font-size: 16px; line-height: 20px; letter-spacing: -0.25px;
  }
  .load-more .lm-sub {
    font-weight: 400; font-size: 12px; line-height: 16px; letter-spacing: -0.25px;
    opacity: 0.85;
  }
  .load-more .lm-cost {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 6px 12px 6px 22px; position: relative;
    background: rgba(0,0,0,0.18); border-radius: 1000px;
    font-weight: 700; font-size: 14px; letter-spacing: -0.25px;
  }
  .load-more .lm-cost img {
    position: absolute; left: -5px; top: -5px; width: 30px; height: 30px;
  }

  /* ─ Bottom nav 83px ──────────────────────── */
  .bottom-nav {
    height: 83px; background: #fff; border-top: 1px solid var(--color-gray-100);
    display: flex; justify-content: space-between; padding: 1px 0 0;
    flex-shrink: 0; position: relative; z-index: 10;
  }
  .nav-item {
    flex: 1; max-width: 78px; height: 55.5px;
    border: 0; background: transparent; cursor: pointer;
    display: flex; flex-direction: column; align-items: center; gap: 0; padding-top: 8px;
  }
  .nav-icon {
    width: 30px; height: 30px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
  }
  .nav-icon svg { width: 25px; height: 25px; stroke: var(--color-gray-600); fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
  .nav-label {
    font-family: var(--font-sans); font-size: 13px; line-height: 20px;
    font-weight: 400; color: var(--color-gray-600); letter-spacing: -0.25px;
  }
  .nav-item.active .nav-icon svg { stroke: var(--color-primary-500); }
  .nav-item.active .nav-label {
    color: var(--color-primary-500); font-weight: 700; letter-spacing: -0.3144px; line-height: normal;
  }

  .home-indicator {
    position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%);
    width: 139px; height: 5px; border-radius: 100px; background: rgba(0,0,0,0.3);
  }

  /* ─ Popup (purchase confirmation) ────────── */
  .modal-backdrop {
    position: absolute; inset: 0; z-index: 100;
    background: rgba(26,26,26,0.45);
    display: flex; align-items: center; justify-content: center;
    padding: 20px;
    opacity: 0; pointer-events: none;
    transition: opacity 220ms cubic-bezier(0.2, 0, 0, 1);
  }
  .modal-backdrop.open { opacity: 1; pointer-events: auto; }

  .modal-card {
    width: 100%; max-width: 320px;
    background: #fff; border-radius: 20px;
    box-shadow: 0 12px 40px rgba(26,26,26,0.12);
    padding: 28px 20px 20px;
    display: flex; flex-direction: column; align-items: center; gap: 12px;
    transform: scale(0.94) translateY(12px);
    transition: transform 220ms cubic-bezier(0.2, 0, 0, 1);
  }
  .modal-backdrop.open .modal-card { transform: scale(1) translateY(0); }

  .modal-preview {
    display: flex; justify-content: center; align-items: center;
    padding: 4px 0 6px;
  }
  .preview-avatar {
    width: 64px; height: 64px; border-radius: 50%;
    overflow: hidden; border: 3px solid #fff;
    box-shadow: 0 4px 12px rgba(26,26,26,0.12);
    position: relative;
    margin-left: -18px;
    background: var(--color-gray-100);
    flex-shrink: 0;
  }
  .preview-avatar:first-child { margin-left: 0; }
  .preview-avatar video {
    width: 100%; height: 100%; object-fit: cover; display: block;
  }
  .preview-avatar.more {
    background: var(--gradient-brand);
    display: flex; align-items: center; justify-content: center;
    color: #fff; font-family: var(--font-sans); font-weight: 800; font-size: 15px;
    letter-spacing: -0.3px;
  }

  .modal-title {
    font-family: var(--font-sans); font-weight: 800; font-size: 20px; line-height: 1.3;
    color: var(--color-gray-950); letter-spacing: -0.4px; text-align: center;
    margin: 0;
  }
  .modal-desc {
    font-family: var(--font-sans); font-weight: 400; font-size: 14px; line-height: 20px;
    color: var(--color-gray-700); letter-spacing: -0.25px; text-align: center;
    margin: 0 0 4px;
  }

  /* balance preview row */
  .modal-balance {
    width: 100%; background: var(--color-gray-50);
    border-radius: 12px; padding: 12px 14px;
    display: flex; justify-content: space-between; align-items: center;
    font-family: var(--font-sans); font-size: 13px; letter-spacing: -0.25px;
    color: var(--color-gray-700); margin-top: 4px;
  }
  .modal-balance .bal-label { font-weight: 500; }
  .modal-balance .bal-amounts {
    display: flex; align-items: center; gap: 8px;
    font-weight: 700; color: var(--color-gray-950);
    font-variant-numeric: tabular-nums;
  }
  .modal-balance .bal-old { color: var(--color-gray-500); text-decoration: line-through; font-weight: 400; }
  .modal-balance .bal-arrow { color: var(--color-gray-500); font-weight: 400; }
  .modal-balance .bal-new { color: var(--color-primary-500); }

  .modal-actions {
    width: 100%; display: flex; gap: 8px; margin-top: 12px;
  }
  .modal-btn {
    flex: 1; height: 48px; border: 0; border-radius: 8px;
    font-family: var(--font-sans); font-weight: 700; font-size: 16px;
    letter-spacing: -0.25px; cursor: pointer;
    transition: background 140ms cubic-bezier(0.2, 0, 0, 1), transform 100ms ease;
  }
  .modal-btn:active { transform: scale(0.98); }
  .modal-btn.secondary {
    background: var(--color-gray-50); color: var(--color-gray-800);
  }
  .modal-btn.secondary:hover { background: var(--color-gray-100); }
  .modal-btn.primary {
    background: var(--color-primary-500); color: #fff;
  }
  .modal-btn.primary:hover { background: var(--color-primary-600); }
  .modal-btn.primary:active { background: var(--color-primary-700); }

  /* ─ Toast (after purchase) ───────────────── */
  .toast {
    position: absolute; bottom: 110px; left: 50%; transform: translateX(-50%) translateY(10px);
    z-index: 95; background: var(--color-gray-950); color: #fff;
    padding: 12px 18px; border-radius: 1000px;
    font-family: var(--font-sans); font-weight: 600; font-size: 13px;
    letter-spacing: -0.25px;
    opacity: 0; pointer-events: none;
    transition: opacity 220ms cubic-bezier(0.2, 0, 0, 1), transform 220ms cubic-bezier(0.2, 0, 0, 1);
    display: inline-flex; align-items: center; gap: 8px;
    white-space: nowrap;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .toast svg { stroke: var(--color-accent-success); }
</style>
</head>
<body>

<div class="page">
  <div class="page-head">
    <div class="eyebrow">Home · Figma 2:14396</div>
    <h1 class="page-h1">최근 활동 위, 새로운 만남 아래</h1>
    <p class="page-sub">Figma 디자인 그대로. 상단 진행 중/완료 프로필 스트립, 칩 2개(추천·새로운), 2×3 영상 그리드.</p>
  </div>

  <div class="phone">
    <div class="island"></div>

    <!-- Status bar -->
    <div class="status-bar">
      <div class="time">9:41</div>
      <div class="icons">
        <svg width="17" height="11" viewBox="0 0 18 12" fill="none"><path d="M1 7.5 h2 M4.5 6 h2 M8 4.5 h2 M11.5 3 h2 M15 1.5 h2" stroke="#171717" stroke-width="2.5" stroke-linecap="round"/></svg>
        <svg width="17" height="11" viewBox="0 0 17 11" fill="none"><path d="M8.5 2.2C10.8 2.2 12.9 3.1 14.4 4.6L15.5 3.5C13.7 1.7 11.2 0.5 8.5 0.5S3.3 1.7 1.5 3.5L2.6 4.6C4.1 3.1 6.2 2.2 8.5 2.2z" fill="#171717"/><circle cx="8.5" cy="9.5" r="1.5" fill="#171717"/></svg>
        <svg width="26" height="12" viewBox="0 0 26 12"><rect x="0.5" y="0.5" width="22" height="11" rx="3" stroke="#171717" fill="none"/><rect x="2" y="2" width="19" height="8" rx="1.5" fill="#171717"/><rect x="23.5" y="4" width="1.5" height="4" rx="0.5" fill="#171717" opacity="0.5"/></svg>
      </div>
    </div>

    <!-- Header: settings + Rizz wordmark (left group) + coin pill (right) -->
    <div class="header">
      <div class="header-left">
        <!-- settings icon 24px -->
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#1A1A1A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12.22 2h-.44a2 2 0 00-2 2v.18a2 2 0 01-1 1.73l-.43.25a2 2 0 01-2 0l-.15-.08a2 2 0 00-2.73.73l-.22.38a2 2 0 00.73 2.73l.15.1a2 2 0 011 1.72v.51a2 2 0 01-1 1.74l-.15.09a2 2 0 00-.73 2.73l.22.38a2 2 0 002.73.73l.15-.08a2 2 0 012 0l.43.25a2 2 0 011 1.73V20a2 2 0 002 2h.44a2 2 0 002-2v-.18a2 2 0 011-1.73l.43-.25a2 2 0 012 0l.15.08a2 2 0 002.73-.73l.22-.39a2 2 0 00-.73-2.73l-.15-.08a2 2 0 01-1-1.74v-.5a2 2 0 011-1.74l.15-.09a2 2 0 00.73-2.73l-.22-.38a2 2 0 00-2.73-.73l-.15.08a2 2 0 01-2 0l-.43-.25a2 2 0 01-1-1.73V4a2 2 0 00-2-2z"/>
          <circle cx="12" cy="12" r="3"/>
        </svg>
        <!-- Rizz wordmark — orange #FF5E19 -->
        <svg class="wordmark" viewBox="0 0 679.246 265.234" fill="#FF5E19">
          <path d="M 0 265.234 L 0 17.773 L 105.273 17.773 C 160.645 17.773 196.875 49.219 196.875 101.514 C 196.875 135.693 181.152 159.961 154.492 172.607 L 205.078 265.234 L 134.326 265.234 L 90.576 182.861 L 64.941 182.861 L 64.941 265.234 L 0 265.234 Z M 64.941 131.934 L 90.234 131.934 C 114.844 131.934 128.857 123.047 128.857 101.514 C 128.857 79.639 114.844 69.727 90.234 69.727 L 64.941 69.727 L 64.941 131.934 Z"/>
          <path d="M 223.453 265.234 L 223.453 79.639 L 288.053 79.639 L 288.053 265.234 L 223.453 265.234 Z M 255.582 59.473 C 237.809 59.473 223.453 46.143 223.453 29.736 C 223.453 13.33 237.809 0 255.582 0 C 273.355 0 287.711 13.33 287.711 29.736 C 287.711 46.143 273.355 59.473 255.582 59.473 Z"/>
          <path d="M 320.441 265.234 L 320.441 229.346 L 403.156 129.883 L 403.156 128.857 L 323.518 128.857 L 323.518 79.639 L 479.377 79.639 L 479.377 119.287 L 403.84 214.648 L 403.84 215.674 L 482.453 215.674 L 482.453 265.234 L 320.441 265.234 Z"/>
          <path d="M 517.234 265.234 L 517.234 229.346 L 599.949 129.883 L 599.949 128.857 L 520.311 128.857 L 520.311 79.639 L 676.17 79.639 L 676.17 119.287 L 600.633 214.648 L 600.633 215.674 L 679.246 215.674 L 679.246 265.234 L 517.234 265.234 Z"/>
        </svg>
      </div>

      <!-- Coin pill -->
      <div class="coin-pill">
        <img class="coin-img" src="../assets/images/coin.png" alt=""><span id="coinBalance">430</span>
      </div>
    </div>

    <!-- Body -->
    <div class="body">

      <!-- Activity strip -->
      <div class="activity" id="activity"></div>

      <!-- Daily meetings card -->
      <div class="daily">
        <div class="daily-top">
          <div class="daily-title">오늘 만날 수 있는 캐릭터</div>
          <div class="daily-count"><b>5</b> / 10</div>
        </div>
        <div class="daily-bar"><div class="daily-fill" style="width:50%"></div></div>
        <div class="daily-caption">다음 무료 티켓까지 <b id="ticketTimer">03:42:18</b> 남음</div>
      </div>

      <!-- Grid — 10 tiles (2 × 5) -->
      <div class="grid" id="grid"></div>

      <!-- Load more CTA -->
      <div class="load-more-wrap">
        <button class="load-more">
          <div class="lm-text">
            <div class="lm-main">캐릭터 10명 더 보기</div>
            <div class="lm-sub">티켓을 구매하고 다음 10명을 만나보세요</div>
          </div>
          <div class="lm-cost">
            <img src="../assets/images/coin.png" alt="">10
          </div>
        </button>
      </div>

    </div>

    <!-- Bottom nav -->
    <div class="bottom-nav">
      <button class="nav-item active">
        <div class="nav-icon">
          <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><path d="M9 22V12h6v10"/></svg>
        </div>
        <div class="nav-label">홈</div>
      </button>
      <button class="nav-item">
        <div class="nav-icon">
          <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 7v10M9 10h4a2 2 0 010 4h-4a2 2 0 000 4h5"/></svg>
        </div>
        <div class="nav-label">코인</div>
      </button>
      <button class="nav-item">
        <div class="nav-icon">
          <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
        </div>
        <div class="nav-label">데이트</div>
      </button>
      <button class="nav-item">
        <div class="nav-icon">
          <svg viewBox="0 0 24 24"><path d="M21 11.5a8.4 8.4 0 01-.9 3.8 8.5 8.5 0 01-7.6 4.7 8.4 8.4 0 01-3.8-.9L3 21l1.9-5.7a8.4 8.4 0 01-.9-3.8 8.5 8.5 0 014.7-7.6 8.4 8.4 0 013.8-.9h.5a8.5 8.5 0 018 8z"/></svg>
        </div>
        <div class="nav-label">채팅</div>
      </button>
      <button class="nav-item">
        <div class="nav-icon">
          <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        </div>
        <div class="nav-label">마이페이지</div>
      </button>
      <div class="home-indicator"></div>
    </div>

    <!-- Purchase confirmation popup (centered across entire phone frame) -->
    <div class="modal-backdrop" id="purchaseModal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <div class="modal-card">
        <div class="modal-preview">
          <div class="preview-avatar"><video src="../assets/videos/01.mp4" autoplay muted loop playsinline preload="metadata"></video></div>
          <div class="preview-avatar"><video src="../assets/videos/02.mp4" autoplay muted loop playsinline preload="metadata"></video></div>
          <div class="preview-avatar"><video src="../assets/videos/03.mp4" autoplay muted loop playsinline preload="metadata"></video></div>
          <div class="preview-avatar more">+10</div>
        </div>
        <h2 class="modal-title" id="modalTitle">캐릭터 10명 더 만날까요?</h2>
        <p class="modal-desc">티켓 구매시 새로운 캐릭터 10명을<br>더 만날 수 있어요!</p>
        <div class="modal-balance">
          <span class="bal-label">코인 차감</span>
          <span class="bal-amounts">
            <span class="bal-old" id="balOld">430</span>
            <span class="bal-arrow">→</span>
            <span class="bal-new" id="balNew">420</span>
          </span>
        </div>
        <div class="modal-actions">
          <button class="modal-btn secondary" id="modalCancel">취소</button>
          <button class="modal-btn primary" id="modalConfirm">구매하기</button>
        </div>
      </div>
    </div>

    <!-- Toast after purchase -->
    <div class="toast" id="toast">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
      새로운 캐릭터 10명이 열렸어요
    </div>
  </div>
</div>

<script>
  const VIDEOS = [
    '../assets/videos/01.mp4',
    '../assets/videos/02.mp4',
    '../assets/videos/03.mp4',
    '../assets/videos/04.mp4',
    '../assets/videos/05.mp4',
  ];

  // ── Activity profiles (16유형 중 대화 진행된 6명) ──
  const profiles = [
    { name: '민아', v: 0, state: 'progress' },   // 애정결핍 — 대화 중
    { name: '수현', v: 1, state: 'completed' },  // 의존
    { name: '예린', v: 2, state: 'completed' },  // 상처
    { name: '지아', v: 3, state: 'completed' },  // 집착
    { name: '소미', v: 4, state: 'completed' },  // 고독
    { name: '보라', v: 0, state: 'completed' },  // 인정결핍
  ];

  const activityEl = document.getElementById('activity');
  activityEl.innerHTML = profiles.map(p => `
    <div class="profile">
      <div class="avatar">
        <video src="${VIDEOS[p.v]}" autoplay muted loop playsinline preload="metadata"></video>
      </div>
      <div class="badge-row">
        <span class="badge ${p.state}">${p.state === 'progress' ? '진행 중' : '완료'}</span>
        <span class="profile-name">${p.name}</span>
      </div>
    </div>
  `).join('');

  // ── Grid tiles — 16유형 중 오늘 무료 풀 10명 (2 × 5) ──
  const tiles = [
    { name: '민아', age: 23, v: 0, desc: '다정한 · 연남',    tags: [['💗','애정'], ['☕','포근'], ['🏠','다정']] },
    { name: '수현', age: 26, v: 1, desc: '누나 · 성수',      tags: [['🤍','든든'], ['🎯','리드'], ['💼','안정']] },
    { name: '예린', age: 24, v: 2, desc: '조용한 · 홍대',    tags: [['🌙','치유'], ['🎧','조용'], ['🌿','공감']] },
    { name: '지아', age: 22, v: 3, desc: '헌신적 · 이태원',  tags: [['💘','집착'], ['🎨','미술'], ['🔐','전부']] },
    { name: '소미', age: 23, v: 4, desc: '밝은 · 강남',      tags: [['✨','활달'], ['🎉','사교'], ['🤝','유쾌']] },
    { name: '보라', age: 25, v: 0, desc: '팬 · 성수',        tags: [['🌟','응원'], ['💬','칭찬'], ['🎤','팬심']] },
    { name: '유진', age: 24, v: 1, desc: '적극적인 · 여의도', tags: [['🔥','리드'], ['😄','유머'], ['💋','대담']] },
    { name: '하린', age: 22, v: 2, desc: '순수한 · 종로',    tags: [['🌸','첫사랑'], ['📚','순수'], ['🕊️','천천']] },
    { name: '릴리', age: 26, v: 3, desc: '관능적 · 청담',    tags: [['🌹','관능'], ['🌙','꿈'], ['🔥','환상']] },
    { name: '지수', age: 25, v: 4, desc: '지적인 · 신촌',    tags: [['🎓','지적'], ['📖','학구'], ['👁️','안목']] },
  ];

  const gridEl = document.getElementById('grid');
  gridEl.innerHTML = tiles.map(tileHtml).join('');

  function tileHtml(t) {
    const tagsHtml = t.tags.map(([emoji, text]) =>
      `<span class="tag"><span>${emoji}</span><span>${text}</span></span>`
    ).join('');
    return `
      <div class="tile">
        <video src="${VIDEOS[t.v]}" autoplay muted loop playsinline preload="metadata"></video>
        <div class="tile-content">
          <div class="tile-text">
            <div class="tile-name-row">
              <span class="tile-name">${t.name}</span>
              <span class="tile-age">${t.age}</span>
            </div>
            <div class="tile-desc">${t.desc}</div>
          </div>
          <div class="tags">${tagsHtml}</div>
        </div>
      </div>`;
  }

  // ── Ticket countdown ────────────────────────
  const timerEl = document.getElementById('ticketTimer');
  let total = 3 * 3600 + 42 * 60 + 18;
  function tick() {
    total = Math.max(0, total - 1);
    const h = String(Math.floor(total / 3600)).padStart(2, '0');
    const m = String(Math.floor((total % 3600) / 60)).padStart(2, '0');
    const s = String(total % 60).padStart(2, '0');
    timerEl.textContent = `${h}:${m}:${s}`;
  }
  setInterval(tick, 1000);

  // ── Purchase popup ──────────────────────────
  const modal = document.getElementById('purchaseModal');
  const toast = document.getElementById('toast');
  const coinBalanceEl = document.getElementById('coinBalance');
  const balOldEl = document.getElementById('balOld');
  const balNewEl = document.getElementById('balNew');
  const loadMoreBtn = document.querySelector('.load-more');
  const TICKET_COST = 10;
  let balance = parseInt(coinBalanceEl.textContent, 10);

  function openModal() {
    balOldEl.textContent = balance;
    balNewEl.textContent = balance - TICKET_COST;
    modal.classList.add('open');
  }
  function closeModal() { modal.classList.remove('open'); }

  loadMoreBtn.addEventListener('click', openModal);
  document.getElementById('modalCancel').addEventListener('click', closeModal);
  modal.addEventListener('click', e => { if (e.target === modal) closeModal(); });
  document.addEventListener('keydown', e => { if (e.key === 'Escape' && modal.classList.contains('open')) closeModal(); });

  document.getElementById('modalConfirm').addEventListener('click', () => {
    balance -= TICKET_COST;
    coinBalanceEl.textContent = balance;
    closeModal();
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 1800);
  });

  // ── Pause offscreen videos for perf ─────────
  const io = new IntersectionObserver(entries => {
    entries.forEach(e => {
      const v = e.target;
      if (e.isIntersecting) v.play().catch(()=>{});
      else v.pause();
    });
  }, { threshold: 0.2 });
  document.querySelectorAll('video').forEach(v => io.observe(v));
</script>
</body>
</html>
